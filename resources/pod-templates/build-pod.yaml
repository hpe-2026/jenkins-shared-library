apiVersion: v1
kind: Pod
# ─────────────────────────────────────────────────────────────────────────────
# Jenkins Kubernetes Agent Pod Template
#
# This YAML is loaded by the shared library via `libraryResource()` and used
# as the pod template for every pipeline build.
#
# Containers:
#   devops   – Node 20 Alpine.  Handles git, npm, python, yq, curl, sonar-scanner.
#              Tools are installed once in the Setup stage (not repeated per step).
#   kaniko   – Kaniko executor (debug image includes busybox shell).
#              Builds & pushes OCI images to Nexus.  No Docker daemon needed.
#   security – Trivy image/filesystem scanner.
#   jnlp     – Auto-injected by Jenkins for agent ↔ controller communication.
#
# Secrets (must be created out-of-band in the cluster):
#   nexus-docker-config – JSON Docker config for Kaniko to push to Nexus.
#     kubectl create secret generic nexus-docker-config \
#       --from-file=config.json=/path/to/nexus-docker-config.json \
#       -n system
# ─────────────────────────────────────────────────────────────────────────────
metadata:
  labels:
    app: merch-build
    managed-by: jenkins
spec:
  serviceAccountName: jenkins
  restartPolicy: Never

  # Prevent builds from landing on control-plane nodes
  nodeSelector:
    kubernetes.io/os: linux

  containers:
    # ── devops container ───────────────────────────────────────────────────────
    # Primary build environment.  Node 20 Alpine is small and fast.
    # Additional tools (git, curl, jq, yq, python3, pip3, sonar-scanner) are
    # installed once at pipeline startup via `apk add`.
    - name: devops
      image: node:20-alpine
      command: ["sleep"]
      args: ["99d"]
      tty: true
      workingDir: /home/jenkins/agent
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "2Gi"
          cpu: "2000m"
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent
        # npm cache persisted across builds (requires a PVC for full effect)
        - name: npm-cache
          mountPath: /root/.npm

    # ── kaniko container ───────────────────────────────────────────────────────
    # The :debug image ships /busybox/sh which is required for `sleep 99d`.
    # The nexus-docker-config secret is mounted so Kaniko can authenticate to
    # the Nexus Docker registry without needing `docker login`.
    - name: kaniko
      image: gcr.io/kaniko-project/executor:debug
      command: ["sleep"]
      args: ["99d"]
      tty: true
      workingDir: /home/jenkins/agent
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "2Gi"
          cpu: "2000m"
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent
        - name: nexus-docker-config
          mountPath: /kaniko/.docker
          readOnly: true

    # ── security container ─────────────────────────────────────────────────────
    # Trivy runs as a separate container so it does not compete for CPU/memory
    # with the devops build steps.
    - name: security
      image: aquasec/trivy:latest
      command: ["sleep"]
      args: ["99d"]
      tty: true
      workingDir: /home/jenkins/agent
      resources:
        requests:
          memory: "256Mi"
          cpu: "200m"
        limits:
          memory: "1Gi"
          cpu: "500m"
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent

  volumes:
    # Shared workspace between all containers
    - name: workspace-volume
      emptyDir: {}

    # Nexus Docker credentials for Kaniko image pushes
    # Must be created manually in the cluster (see header comment above)
    - name: nexus-docker-config
      secret:
        secretName: nexus-docker-config

    # npm cache volume — provides cross-build npm caching when backed by a PVC.
    # Replace emptyDir with a PVC for full caching benefit.
    - name: npm-cache
      emptyDir: {}
